<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>متابع الشهر</title>
<style>
  :root{
    --gold:#e8c46b;
    --green:#4a7c3f;
    --lightgreen:#8fbf7a;
    --bg1:#fdf6e3;
    --bg2:#f4e6b8;
    --red:#d9534f;
    --blue:#3a6fb5;
    --cardbg:#fffdf5;
    --text:#3a3a2a;
    --text-dark:#3a2e10;
    --border:#d8c98a;
    --space-sm:8px;
    --space-md:12px;
    --space-lg:16px;
    --space-xl:24px;
    --radius:8px;
    --shadow:0 4px 15px rgba(0,0,0,0.1);
  }
  *{box-sizing:border-box;}
  body{
    font-family:'Segoe UI',Tahoma,sans-serif;
    background:linear-gradient(135deg,var(--bg1),var(--bg2));
    margin:0;padding:0;color:var(--text);
    min-height:100vh;
  }
  button:focus-visible,
  select:focus-visible,
  input:focus-visible,
  textarea:focus-visible,
  .day-cell:focus-visible{
    outline:2px solid var(--green);
    outline-offset:2px;
  }
  .header{
    text-align:center;
    padding:var(--space-xl) var(--space-md) var(--space-sm);
  }
  .header h1{
    font-size:2.2rem;
    color:var(--text-dark);
    text-shadow:1px 1px 0 #fff;
    margin:0 0 var(--space-md);
  }
  .top-bar{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:var(--space-md);
    flex-wrap:wrap;
    margin:0 auto var(--space-xl);
    padding:0 var(--space-md);
  }
  select, input[type="number"], input[type="text"], button{
    padding:8px 14px;
    border-radius:var(--radius);
    border:1px solid var(--green);
    font-size:1rem;
    background:var(--cardbg);
    cursor:pointer;
    font-family:inherit;
  }
  input[type="text"]{cursor:text;}
  button.primary{
    background:var(--green);
    color:#fff;
    border:none;
  }
  button.primary:hover{background:#3a6230;}
  button.danger{
    background:var(--red);
    color:#fff;
    border:none;
  }
  button.danger:hover{background:#c9302c;}
  .view-btn{
    background:var(--cardbg);
    color:var(--text-dark);
  }
  .view-btn.primary{
    background:var(--green);
    color:#fff;
    border:none;
  }
  .month-panel{display:none;}
  .month-panel.is-visible{display:block;}
  .day-view{display:none;max-width:800px;margin:0 auto 30px;padding:0 var(--space-md);}
  .day-view.is-visible{display:block;}
  .table-wrap{
    overflow-x:auto;
    margin:0 auto 30px;
    max-width:100%;
    padding:0 var(--space-md);
  }
  .table-legend{
    display:flex;
    gap:var(--space-lg);
    flex-wrap:wrap;
    justify-content:center;
    margin-bottom:var(--space-md);
    font-size:0.9rem;
  }
  .table-legend span{display:inline-flex;align-items:center;gap:4px;}
  table{
    border-collapse:separate;
    border-spacing:0;
    width:100%;
    min-width:1100px;
    background:var(--cardbg);
    border-radius:10px;
    box-shadow:var(--shadow);
  }
  th, td{
    border:1px solid var(--border);
    text-align:center;
    padding:6px 4px;
    font-size:0.85rem;
  }
  thead th{
    background:var(--gold);
    color:var(--text-dark);
    font-weight:bold;
    position:sticky;
    top:0;
    z-index:2;
  }
  thead th .day-name,
  thead th .day-num{
    display:block;
    line-height:1.2;
  }
  thead th .day-name{
    font-size:0.7rem;
    font-weight:600;
    opacity:0.85;
  }
  thead th .day-num{
    font-size:0.9rem;
  }
  thead th.habit-col{
    z-index:3;
  }
  .habit-cell, th.habit-col{
    text-align:right;
    padding-right:10px;
    font-weight:bold;
    background:#fffaf0;
    min-width:160px;
    white-space:nowrap;
    position:sticky;
    right:0;
    z-index:1;
  }
  th.habit-col{background:var(--gold);z-index:3;}
  .habit-streak{
    display:inline-block;
    font-size:0.8rem;
    font-weight:bold;
    color:#b45309;
    margin-inline-start:6px;
    white-space:nowrap;
  }
  .day-cell{
    cursor:pointer;
    font-size:1.1rem;
    user-select:none;
    min-width:32px;
    height:32px;
    transition:background 0.2s, color 0.2s;
  }
  .day-cell.heat-empty{
    background:#ebedf0;
    color:transparent;
  }
  .day-cell.heat-done{
    background:#2d6a27;
    color:#fff;
    font-weight:bold;
  }
  .day-cell.heat-missed{
    background:#f5d0d0;
    color:var(--red);
    font-weight:bold;
  }
  .day-cell.heat-empty:hover{background:#d0d7de;}
  .day-cell.heat-done:hover{background:#245820;}
  .day-cell.heat-missed:hover{background:#eeb8b8;}
  .day-cell.today-col.heat-empty{
    box-shadow:inset 0 0 0 2px var(--gold);
  }
  .day-cell.today-col.heat-done{
    box-shadow:inset 0 0 0 2px #f0c14b;
  }
  .day-cell.today-col.heat-missed{
    box-shadow:inset 0 0 0 2px var(--gold);
  }
  th.today-col{box-shadow:inset 0 -3px 0 var(--green);}
  .mark-check{color:#2e8b2e;font-weight:bold;}
  .legend-swatch{
    display:inline-block;
    width:14px;height:14px;
    border-radius:3px;
    vertical-align:middle;
  }
  .legend-swatch.empty{background:#ebedf0;border:1px solid #d0d7de;}
  .legend-swatch.done{background:#2d6a27;}
  .legend-swatch.missed{background:#f5d0d0;border:1px solid var(--red);color:var(--red);font-size:10px;line-height:14px;text-align:center;font-weight:bold;}
  .mark-x{color:var(--red);font-weight:bold;}
  .mark-dash{color:var(--blue);font-weight:bold;}
  .points-row td{background:#fff3d6;font-weight:bold;}
  th.friday-col,
  td.friday-col,
  .points-row td.friday-col{
    background:#e8e8e8;
  }
  /* Friday/today must not override heatmap fills on day cells */
  .day-cell.friday-col.heat-empty{background:#e0e0e0;}
  .day-cell.friday-col.heat-done{background:#2d6a27;color:#fff;}
  .day-cell.friday-col.heat-missed{background:#f5d0d0;color:var(--red);}
  .day-cell.friday-col.heat-empty:hover{background:#d0d7de;}
  .day-cell.friday-col.heat-done:hover{background:#245820;}
  .day-cell.friday-col.heat-missed:hover{background:#eeb8b8;}
  .points-row td.friday-col.today-col{
    background:#e0e0e0;
  }
  th.friday-col.today-col{background:#d8d8d8;}
  .cat-group-row td{
    background:#e8f0e4;
    text-align:right;
    font-weight:bold;
    color:#1f3a17;
    padding:8px 12px;
  }
  .weekly-section{
    max-width:1300px;
    margin:0 auto 40px;
    padding:0 var(--space-md);
    display:none;
    grid-template-columns:1fr 1fr;
    gap:20px;
  }
  .weekly-section.is-visible{display:grid;}
  .weekly-card{
    background:var(--cardbg);
    border-radius:10px;
    padding:15px;
    box-shadow:var(--shadow);
  }
  .weekly-card h3{
    margin-top:0;
    color:var(--text-dark);
    display:flex;
    flex-wrap:wrap;
    align-items:baseline;
    justify-content:space-between;
    gap:8px;
  }
  .week-numbers{
    font-weight:600;
    color:var(--green);
    font-size:0.9rem;
  }
  textarea{
    width:100%;
    min-height:90px;
    border-radius:var(--radius);
    border:1px solid var(--green);
    padding:8px;
    font-family:inherit;
    resize:vertical;
  }
  .week-points{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-top:10px;
  }
  .week-points span{
    background:var(--lightgreen);
    color:#1f3a17;
    padding:5px 10px;
    border-radius:6px;
    font-size:0.85rem;
  }
  .habit-manager .row{
    display:flex;
    gap:8px;
    margin-bottom:var(--space-md);
    flex-wrap:wrap;
  }
  .habit-list-manage{
    display:flex;
    flex-direction:column;
    gap:6px;
    max-height:240px;
    overflow-y:auto;
    margin-top:var(--space-md);
  }
  .habit-manage-item{
    display:flex;
    align-items:center;
    gap:8px;
    background:#f8f4e8;
    padding:6px 10px;
    border-radius:var(--radius);
  }
  .habit-manage-item input[type="text"]{
    flex:1;
    border:1px solid #ccc;
    border-radius:6px;
    padding:4px 8px;
    min-width:0;
  }
  .habit-manage-item .icon-input{width:56px;flex:0 0 56px;text-align:center;}
  .day-view-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
    gap:10px;
    flex-wrap:wrap;
  }
  .day-view-header h2{
    margin:0;
    color:var(--text-dark);
    text-align:center;
    flex:1;
  }
  .month-nav-bar{
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
    justify-content:center;
  }
  .month-nav-label{
    font-weight:bold;
    color:var(--text-dark);
    min-width:7rem;
    text-align:center;
  }
  .day-habit-list{
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .day-habit-item{
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:var(--cardbg);
    border-radius:10px;
    padding:12px 16px;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
    gap:10px;
    flex-wrap:wrap;
  }
  .day-habit-name{
    font-weight:bold;
    font-size:1.05rem;
    flex:1;
    transition:opacity 180ms ease, color 180ms ease;
  }
  .day-habit-item.is-complete .day-habit-name{
    text-decoration:line-through;
    opacity:0.65;
    color:#5a5a4a;
  }
  .day-habit-cat{
    background:var(--lightgreen);
    color:#1f3a17;
    font-size:0.75rem;
    padding:3px 8px;
    border-radius:6px;
  }
  .day-toggle-group{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:6px;
    min-width:min(100%, 280px);
  }
  .day-toggle-btn{
    padding:6px 10px;
    border-radius:var(--radius);
    border:1px solid #8a8a8a;
    cursor:pointer;
    background:#fafafa;
    color:#3a3a2a;
    font-size:0.9rem;
    font-weight:bold;
    width:100%;
    text-align:center;
    white-space:nowrap;
    transition:background-color 180ms ease, color 180ms ease, border-color 180ms ease;
  }
  .day-toggle-btn.active-check{
    background:#1b5e20;
    color:#fff;
    border-color:#1b5e20;
  }
  .day-toggle-btn.active-x{
    background:var(--red);
    color:#fff;
    border-color:var(--red);
  }
  .day-toggle-btn.active-dash{
    background:var(--blue);
    color:#fff;
    border-color:var(--blue);
  }
  .day-picker-row{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
    margin-bottom:15px;
    flex-wrap:wrap;
  }
  .day-total{
    text-align:center;
    font-size:1.4rem;
    font-weight:bold;
    margin-top:20px;
    background:#fff3d6;
    padding:15px;
    border-radius:10px;
    color:var(--text-dark);
  }
  .month-summary{
    display:none;
    max-width:1300px;
    margin:0 auto 20px;
    padding:0 var(--space-md);
  }
  .month-summary.is-visible{display:block;}
  .month-summary-card{
    background:var(--cardbg);
    border-radius:10px;
    padding:15px;
    box-shadow:var(--shadow);
  }
  .month-summary-card h3{margin-top:0;color:var(--text-dark);}
  .habit-progress-row{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:8px;
  }
  .habit-progress-name{
    min-width:160px;
    font-weight:bold;
    font-size:0.9rem;
  }
  .habit-progress-bar-wrap{
    flex:1;
    background:#eee;
    border-radius:6px;
    overflow:hidden;
    height:16px;
  }
  .habit-progress-bar{
    height:100%;
    min-width:0;
    background:var(--green);
    transition:width 0.2s ease;
    border-radius:6px;
  }
  .habit-progress-pct{
    min-width:55px;
    font-size:0.85rem;
    font-weight:bold;
    text-align:left;
  }
  .habit-progress-pct-box{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-width:3.2rem;
    padding:4px 8px;
    border-radius:6px;
    border:1px solid var(--border);
    background:#fffaf0;
    color:var(--green);
    font-size:0.85rem;
    font-weight:bold;
    box-shadow:0 1px 2px rgba(0,0,0,0.06);
  }
  .footer-note{
    text-align:center;
    color:#7a6a3a;
    padding:20px;
    font-size:0.85rem;
  }
  .modal-overlay{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(40,30,10,0.45);
    z-index:100;
    align-items:center;
    justify-content:center;
    padding:var(--space-md);
  }
  .modal-overlay.is-open{display:flex;}
  .modal{
    background:var(--cardbg);
    border-radius:12px;
    box-shadow:0 8px 32px rgba(0,0,0,0.25);
    max-width:640px;
    width:100%;
    max-height:90vh;
    overflow-y:auto;
    padding:var(--space-xl);
    position:relative;
  }
  .modal h2{
    margin:0 0 var(--space-lg);
    color:var(--text-dark);
    font-size:1.4rem;
  }
  .modal-section{
    margin-bottom:var(--space-xl);
    padding-bottom:var(--space-lg);
    border-bottom:1px solid var(--border);
  }
  .modal-section:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0;}
  .modal-section h3{
    margin:0 0 var(--space-md);
    font-size:1rem;
    color:var(--text-dark);
  }
  .modal-row{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    align-items:center;
    margin-bottom:var(--space-sm);
  }
  .modal-close{
    position:absolute;
    top:12px;
    left:12px;
    border:none;
    background:transparent;
    font-size:1.4rem;
    line-height:1;
    cursor:pointer;
    color:var(--text-dark);
    padding:4px 8px;
  }
  .toast{
    position:fixed;
    bottom:24px;
    left:50%;
    transform:translateX(-50%) translateY(80px);
    background:var(--green);
    color:#fff;
    padding:10px 20px;
    border-radius:var(--radius);
    font-weight:bold;
    z-index:200;
    opacity:0;
    transition:opacity 0.25s, transform 0.25s;
    pointer-events:none;
  }
  .toast.is-show{
    opacity:1;
    transform:translateX(-50%) translateY(0);
  }
  .celebration-overlay{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:300;
    overflow:hidden;
    display:none;
  }
  .celebration-overlay.is-show{display:block;}
  .celebration-banner{
    position:absolute;
    top:18%;
    left:50%;
    transform:translateX(-50%) scale(0.6);
    background:var(--green);
    color:#fff;
    padding:14px 28px;
    border-radius:16px;
    font-size:1.15rem;
    font-weight:bold;
    box-shadow:0 8px 28px rgba(0,0,0,0.25);
    opacity:0;
    animation:celebrate-banner 2.4s ease forwards;
    max-width:min(92vw, 420px);
    text-align:center;
    line-height:1.45;
  }
  .confetti-piece{
    position:absolute;
    top:-12px;
    width:10px;
    height:14px;
    border-radius:2px;
    opacity:0.95;
    animation:confetti-fall linear forwards;
  }
  @keyframes celebrate-banner{
    0%{opacity:0;transform:translateX(-50%) scale(0.5) translateY(20px);}
    15%{opacity:1;transform:translateX(-50%) scale(1.08) translateY(0);}
    30%{transform:translateX(-50%) scale(1);}
    75%{opacity:1;transform:translateX(-50%) scale(1);}
    100%{opacity:0;transform:translateX(-50%) scale(0.95) translateY(-10px);}
  }
  @keyframes confetti-fall{
    0%{transform:translate3d(0,0,0) rotate(0deg);opacity:1;}
    100%{transform:translate3d(var(--drift),110vh,0) rotate(720deg);opacity:0;}
  }
  @media (prefers-reduced-motion: reduce){
    .celebration-banner,
    .confetti-piece{animation:none;opacity:0;}
  }
  @media(min-width:901px){
    .table-wrap{
      overflow:visible;
      max-width:none;
      width:100%;
      padding:0 12px;
    }
    table{
      min-width:0;
      table-layout:fixed;
      width:100%;
    }
    th, td{
      padding:4px 1px;
      font-size:0.75rem;
    }
    .habit-cell, th.habit-col{
      min-width:0;
      width:9.5rem;
      padding:4px 6px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      position:sticky;
      right:0;
    }
    .day-cell{
      min-width:0;
      width:auto;
      font-size:0.95rem;
      padding:4px 0;
    }
    thead th:not(.habit-col){
      width:auto;
      padding:4px 0;
    }
    thead th .day-name{font-size:0.65rem;}
    thead th .day-num{font-size:0.8rem;}
    .weekly-section{
      max-width:none;
    }
  }
  @media(max-width:700px){
    .weekly-section.is-visible{grid-template-columns:1fr;}
    .header h1{font-size:1.6rem;}
    .habit-cell, th.habit-col{min-width:120px;}
    .habit-progress-name{min-width:100px;}
  }
</style>
</head>
<body>

<div class="header">
  <h1 id="appTitle">📅 متابع الشهر</h1>
</div>

<div class="top-bar">
  <button class="view-btn primary" id="showDayBtn" type="button">عرض اليوم</button>
  <button class="view-btn" id="showMonthBtn" type="button">عرض الشهر</button>
  <div class="month-nav-bar" aria-label="التنقل بين الشهور">
    <button type="button" id="prevMonthBtn">الشهر السابق</button>
    <span id="monthNavTitle" class="month-nav-label"></span>
    <button type="button" id="nextMonthBtn">الشهر التالي</button>
  </div>
  <button type="button" id="settingsBtn" style="display: none;">الإعدادات</button>
</div>

<div class="day-view" id="dayView">
  <div class="day-view-header">
    <button type="button" id="prevDayBtn"> اليوم السابق</button>
    <h2 id="dayViewTitle"></h2>
    <button type="button" id="nextDayBtn">اليوم التالي </button>
  </div>
  <div class="day-picker-row">
    <label for="daySelect">اختر يومًا آخر: </label>
    <select id="daySelect"></select>
    <button type="button" id="goTodayBtn">اليوم</button>
  </div>
  <div class="day-habit-list" id="dayHabitList"></div>
  <div class="day-total" id="dayTotal"></div>
</div>

<div class="month-panel" id="monthPanel">
  <div class="table-wrap">
    <div class="table-legend" aria-hidden="true">
      <span><span class="legend-swatch empty"></span> غير محدد</span>
      <span><span class="legend-swatch done"></span> ✓ تم</span>
      <span><span class="legend-swatch missed">✗</span> غير مكتمل</span>
    </div>
    <table id="trackerTable">
      <thead>
        <tr id="headerRow"></tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

  <div class="month-summary" id="monthSummary">
    <div class="month-summary-card">
      <h3>ملخص إنجاز الشهر لكل عادة</h3>
      <div id="monthSummaryList"></div>
    </div>
  </div>

  <div class="weekly-section" id="weeklySection"></div>
</div>

<div class="footer-note" id="footerNote">
  في عرض اليوم استخدم أزرار ✓ تم و ✗ غير مكتمل. في عرض الشهر اضغط على الخلية للتبديل بين الفارغ و ✓ و ✗. تُحفظ بياناتك تلقائيًا محليًا لكل شهر على حدة.
</div>

<div class="modal-overlay" id="settingsModal" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
  <div class="modal">
    <button type="button" class="modal-close" id="closeSettingsBtn" aria-label="إغلاق">×</button>
    <h2 id="settingsTitle">الإعدادات</h2>

    <div class="modal-section">
      <h3>الفترة</h3>
      <div class="modal-row">
        <label>الشهر:
          <select id="monthSelect"></select>
        </label>
        <label>السنة:
          <input type="number" id="yearInput" value="2026" min="2000" max="2100" style="width:90px;">
        </label>

function normalizeMark(mark){
  if(mark === "check") return "check";
  if(mark === "x") return "x";
  return "";
}

function habitPointValue(habit){
  return habit.points ?? 10;
}

function pointsForMark(habit, mark){
  return normalizeMark(mark) === "check" ? habitPointValue(habit) : 0;
}

function maxDayPoints(){
  return state.habits.reduce((sum, h) => sum + habitPointValue(h), 0);
}

function getDayPoints(day){
  let earnedPoints = 0;
  state.habits.forEach((h, hIdx) => {
    earnedPoints += pointsForMark(h, state.marks[`${hIdx}_${day}`] || "");
  });
  const possibleDayPoints = maxDayPoints();
  return {
    earnedPoints,
    possibleDayPoints,
    total: earnedPoints,
    max: possibleDayPoints,
    perfect: possibleDayPoints > 0 && earnedPoints >= possibleDayPoints
  };
}

function formatEarnedPossible(earned, possible){

/** Self-tests: earned/possible and category subtotals across الصباح, الظهر, تطويري, قبل النوم */
function runPointsSelfTests(){
  const fixtureHabits = [
    {name:"أ", cat:"الصباح", points:10},
    {name:"ب", cat:"الظهر", points:10},
    {name:"ج", cat:"تطويري", points:10},
    {name:"د", cat:"قبل النوم", points:10},
    {name:"هـ", cat:"قبل النوم", points:0}
  ];
  const fixtureMarks = {"0_1":"check", "1_1":"check", "2_1":"", "3_1":"check", "4_1":"check"};
  const savedHabits = state.habits;
  const savedMarks = state.marks;
  state.habits = fixtureHabits;
  state.marks = fixtureMarks;

  const possibleDayPoints = maxDayPoints();
  console.assert(possibleDayPoints === 40, "possibleDayPoints should be 40 (4×10 + 0)");

  let earnedPoints = 0;
  const byCat = {};
  fixtureHabits.forEach((h, hIdx) => {
    const pts = pointsForMark(h, fixtureMarks[`${hIdx}_1`] || "");
    earnedPoints += pts;
    byCat[h.cat] = (byCat[h.cat] || 0) + pts;
  });
  console.assert(earnedPoints === 30, "earnedPoints should be 30 (أ+ب+د)");
  console.assert(byCat["الصباح"] === 10, "الصباح subtotal");
  console.assert(byCat["الظهر"] === 10, "الظهر subtotal");
  console.assert(byCat["تطويري"] === 0, "تطويري subtotal");
  console.assert(byCat["قبل النوم"] === 10, "قبل النوم subtotal (د=10, هـ=0)");
  const catSum = Object.values(byCat).reduce((a, b) => a + b, 0);
  console.assert(catSum === earnedPoints, "category subtotals must equal day earned");

  const day = getDayPoints(1);
  console.assert(day.earnedPoints === earnedPoints && day.possibleDayPoints === possibleDayPoints,
    "getDayPoints earned/possible mismatch");

  state.habits = savedHabits;
  state.marks = savedMarks;
}

function syncHabitPointsFromDefaults(habits){
  const byName = {};
  DEFAULT_HABITS.forEach(h => {
    if(Object.prototype.hasOwnProperty.call(h, "points")) byName[h.name] = h.points;
  });
  habits.forEach(h => {
    if(Object.prototype.hasOwnProperty.call(byName, h.name)) h.points = byName[h.name];
  });
  return habits;
}

let state = {
  habits: JSON.parse(JSON.stringify(DEFAULT_HABITS)),
  marks: {},
  weekly: {},
  longestStreaks: {}
};

let currentDay = new Date().getDate();
let viewMode = "day";
let weeklyBuiltFor = null;

const VIEW_MODE_KEY = "tracker_view_mode";

function storageKey(year, month){
  return `tracker_${year}_${String(month+1).padStart(2,'0')}`;
}

function daysInMonth(year, month){
  return new Date(year, month+1, 0).getDate();
}

function ensureLongestStreaks(){
  if(!state.longestStreaks || typeof state.longestStreaks !== "object"){
    state.longestStreaks = {};
  }
}

function habitStreakKey(habit){
  return habit?.name || "";
}

function getMarksSnapshot(year, month){
  const cur = getCurrentYearMonth();
  if(year === cur.year && month === cur.month){
    return { marks: state.marks, habits: state.habits };
  }
  const raw = localStorage.getItem(storageKey(year, month));
  if(!raw) return { marks: {}, habits: [] };
  try{
    const parsed = JSON.parse(raw);
    return { marks: parsed.marks || {}, habits: parsed.habits || [] };
  }catch(e){
    return { marks: {}, habits: [] };
  }
}

function isHabitCheckedOn(habitName, year, month, day){
  const { marks, habits } = getMarksSnapshot(year, month);
  const hIdx = habits.findIndex(h => h.name === habitName);
  if(hIdx < 0) return false;
  return normalizeMark(marks[`${hIdx}_${day}`] || "") === "check";
}

/** Consecutive completes walking backward from today; resets on any miss. */
function getCurrentStreak(hIdx){
  const habit = state.habits[hIdx];
  if(!habit) return 0;
  const name = habit.name;
  const now = new Date();
  let y = now.getFullYear();
  let m = now.getMonth();
  let d = now.getDate();
  let streak = 0;
  for(let i = 0; i < 400; i++){
    if(!isHabitCheckedOn(name, y, m, d)) break;
    streak++;
    d -= 1;
    if(d < 1){
      m -= 1;
      if(m < 0){ m = 11; y -= 1; }
      d = daysInMonth(y, m);
    }
  }
  return streak;
}

function getLongestStreakInMonth(hIdx){
  const {year, month} = getCurrentYearMonth();
  const nDays = daysInMonth(year, month);
  let longest = 0;
  let run = 0;
  for(let d = 1; d <= nDays; d++){
    if(normalizeMark(state.marks[`${hIdx}_${d}`] || "") === "check"){
      run++;
      if(run > longest) longest = run;
    } else {
      run = 0;
    }
  }
  return longest;
}

function updateLongestStreak(hIdx){
  ensureLongestStreaks();
  const habit = state.habits[hIdx];
  if(!habit) return;
  const key = habitStreakKey(habit);
  const stored = state.longestStreaks[key] || 0;
  state.longestStreaks[key] = Math.max(stored, getCurrentStreak(hIdx), getLongestStreakInMonth(hIdx));
}

function getPersistedLongestStreak(hIdx){
  ensureLongestStreaks();
  const habit = state.habits[hIdx];
  if(!habit) return 0;
  const key = habitStreakKey(habit);
  return Math.max(state.longestStreaks[key] || 0, getLongestStreakInMonth(hIdx), getCurrentStreak(hIdx));
}

function streakBadgeHtml(hIdx){
  const n = getCurrentStreak(hIdx);
  return `<span class="habit-streak" title="السلسلة الحالية: ${toArabicDigits(n)}">🔥 ${toArabicDigits(n)}</span>`;
}

function getCurrentYearMonth(){
  const year = parseInt(document.getElementById('yearInput').value, 10);
  const month = parseInt(document.getElementById('monthSelect').value, 10);
  return {year, month};
}

function setYearMonth(year, month, day){
  while(month < 0){ month += 12; year -= 1; }
  while(month > 11){ month -= 12; year += 1; }
  document.getElementById('yearInput').value = year;
  document.getElementById('monthSelect').value = month;
  const nDays = daysInMonth(year, month);
  if(day != null) currentDay = day;
  if(currentDay > nDays) currentDay = nDays;
  if(currentDay < 1) currentDay = 1;
  loadState();
}

function shiftMonth(delta){
  const {year, month} = getCurrentYearMonth();
  let y = year;
  let m = month + delta;
  while(m < 0){ m += 12; y -= 1; }
  while(m > 11){ m -= 12; y += 1; }
  const now = new Date();
  const day = (viewMode === "day" && y === now.getFullYear() && m === now.getMonth())
    ? now.getDate()
    : 1;
  setYearMonth(y, m, day);
}

function showToast(msg){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('is-show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => el.classList.remove('is-show'), 2200);
}

function escapeAttr(str){
  return String(str ?? "")
    .replace(/&/g, "&amp;")
    .replace(/"/g, "&quot;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}

function toArabicDigits(value){
  return String(value).replace(/[0-9]/g, d => "٠١٢٣٤٥٦٧٨٩"[d]);
}

function getWeekOfYear(date){
  const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  const dayNum = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() + 4 - dayNum);
  const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
  return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
}

function deleteHabitAt(idx){
  if(!confirm('حذف هذه العادة؟')) return;
  state.habits.splice(idx, 1);
  const newMarks = {};
  Object.keys(state.marks).forEach(k => {
    const [hi, day] = k.split('_');
    const hiNum = parseInt(hi, 10);
    if(hiNum === idx) return;
    const newHi = hiNum > idx ? hiNum - 1 : hiNum;
    newMarks[`${newHi}_${day}`] = state.marks[k];
  });
  state.marks = newMarks;
  saveState();
  renderAll();
}

function loadState(){
  const {year, month} = getCurrentYearMonth();
  const raw = localStorage.getItem(storageKey(year, month));
  if(raw){
    try{
      const parsed = JSON.parse(raw);
      state.habits = syncHabitPointsFromDefaults(
        parsed.habits && parsed.habits.length ? parsed.habits : JSON.parse(JSON.stringify(DEFAULT_HABITS))
      );
      state.marks = parsed.marks || {};
      state.weekly = parsed.weekly || {};
      state.longestStreaks = parsed.longestStreaks || {};
    }catch(e){
      state = {habits: JSON.parse(JSON.stringify(DEFAULT_HABITS)), marks:{}, weekly:{}, longestStreaks:{}};
    }
  } else {
    state = {habits: JSON.parse(JSON.stringify(DEFAULT_HABITS)), marks:{}, weekly:{}, longestStreaks:{}};
  }
  ensureLongestStreaks();
  weeklyBuiltFor = null;
  renderAll();
}

function saveState(){
  const {year, month} = getCurrentYearMonth();
  localStorage.setItem(storageKey(year, month), JSON.stringify(state));
}

function renderAll(){
  updateAppTitle();
  if(viewMode === "month"){
    renderTable();
    renderWeekly(false);
    renderMonthSummary();
  } else {
    renderDayView();
  }
  renderHabitManageList();
}

function updateAppTitle(){
  const {year, month} = getCurrentYearMonth();
  const label = `${MONTH_NAMES[month]} ${toArabicDigits(year)}`;
  const title = document.getElementById('appTitle');
  if(title){
    title.textContent = `📅 متابع شهر ${label}`;
  }
  const monthNav = document.getElementById('monthNavTitle');
  if(monthNav) monthNav.textContent = label;
}

function setViewMode(mode){
  viewMode = mode === "month" ? "month" : "day";
  try{ localStorage.setItem(VIEW_MODE_KEY, viewMode); }catch(e){}
  const isDay = viewMode === "day";
  document.getElementById('dayView').classList.toggle('is-visible', isDay);
  document.getElementById('monthPanel').classList.toggle('is-visible', !isDay);
  document.getElementById('monthSummary').classList.toggle('is-visible', !isDay);
  document.getElementById('weeklySection').classList.toggle('is-visible', !isDay);
  document.getElementById('showDayBtn').classList.toggle('primary', isDay);
  document.getElementById('showMonthBtn').classList.toggle('primary', !isDay);
  if(isDay){
    renderDayView();
  } else {
    renderTable();
    renderWeekly(true);
    renderMonthSummary();
  }
}

function getSavedViewMode(){
  try{
    const saved = localStorage.getItem(VIEW_MODE_KEY);
    if(saved === "month" || saved === "day") return saved;
  }catch(e){}
  return "day";
}

function applyMarkToCell(td, key, mark){
  mark = normalizeMark(mark);
  const heatClass = mark === "check" ? "heat-done" : (mark === "x" ? "heat-missed" : "heat-empty");
  td.className = `day-cell ${heatClass}`;
  if(td.dataset.friday === "1") td.classList.add('friday-col');
  if(td.classList.contains('today-col') || td.dataset.today === "1"){
    td.classList.add('today-col');
  }
  td.textContent = MARK_SYMBOL[mark] || "";
  const habitName = state.habits[parseInt(key.split('_')[0], 10)]?.name || "عادة";
  const day = key.split('_')[1];
  const {year, month} = getCurrentYearMonth();
  const status = MARK_LABEL[mark] || "غير محدد";
  const dateLabel = `${toArabicDigits(day)} ${MONTH_NAMES[month]}`;
  const tip = `${habitName} — ${dateLabel}: ${status}`;
  td.setAttribute('aria-label', tip);
  td.title = tip;
}

function cycleMark(key, td){
  const day = parseInt(key.split('_')[1], 10);
  const hIdx = parseInt(key.split('_')[0], 10);
  const wasPerfect = getDayPoints(day).perfect;
  const wasAtLeastHalfX = dayXRatio(day) >= 0.5;
  const current = normalizeMark(state.marks[key] || "");
  const next = current === "" ? "check" : (current === "check" ? "x" : "");
  state.marks[key] = next;
  applyMarkToCell(td, key, next);
  updateLongestStreak(hIdx);
  saveState();
  updatePointsRow();
  updateWeeklyPoints();
  if(viewMode === "month"){
    renderMonthSummary();
    const habit = state.habits[hIdx];
    const habitCell = td.closest('tr')?.querySelector('.habit-cell');
    if(habit && habitCell){
      habitCell.innerHTML = `${habit.icon||""} ${habit.name} ${streakBadgeHtml(hIdx)}`.trim();
    }
  }
  celebrateIfNewlyPerfect(day, wasPerfect);
  encourageIfHalfX(day, wasAtLeastHalfX);
}

function updatePointsRow(){
  const row = document.getElementById('pointsRow');
  if(!row) return;
  const possibleDayPoints = maxDayPoints();
  const cells = row.querySelectorAll('td[data-day]');
  cells.forEach(td => {
    const d = parseInt(td.dataset.day, 10);
    let earnedPoints = 0;
    state.habits.forEach((h, hIdx) => {
      earnedPoints += pointsForMark(h, state.marks[`${hIdx}_${d}`] || "");
    });
    td.textContent = possibleDayPoints
      ? formatEarnedPossible(earnedPoints, possibleDayPoints)
      : toArabicDigits(earnedPoints);
    td.title = `مكتسب/ممكن: ${earnedPoints} / ${possibleDayPoints}`;
  });
}

function renderTable(){
  const {year, month} = getCurrentYearMonth();
  const nDays = daysInMonth(year, month);
  const now = new Date();
  const todayDay = (now.getFullYear() === year && now.getMonth() === month) ? now.getDate() : -1;
  const headerRow = document.getElementById('headerRow');
  const tbody = document.getElementById('tableBody');
  headerRow.innerHTML = "";
  tbody.innerHTML = "";

  const thHabit = document.createElement('th');
  thHabit.textContent = "العادة";
  thHabit.className = "habit-col";
  headerRow.appendChild(thHabit);

  for(let d = 1; d <= nDays; d++){
    const th = document.createElement('th');
    const weekday = new Date(year, month, d).getDay();
    th.innerHTML = `<span class="day-name">${DAY_NAMES[weekday]}</span><span class="day-num">${toArabicDigits(d)}</span>`;
    if(weekday === 5) th.classList.add('friday-col');
    if(d === todayDay) th.classList.add('today-col');
    headerRow.appendChild(th);
  }

  let lastCat = null;
  state.habits.forEach((habit, hIdx) => {
    const cat = habit.cat || "—";
    if(cat !== lastCat){
      lastCat = cat;
      const groupTr = document.createElement('tr');
      groupTr.className = "cat-group-row";
      const td = document.createElement('td');
      td.colSpan = 1 + nDays;
      td.textContent = cat;
      groupTr.appendChild(td);
      tbody.appendChild(groupTr);
    }

    const tr = document.createElement('tr');
    const tdHabit = document.createElement('td');
    tdHabit.className = "habit-cell";
    tdHabit.innerHTML = `${habit.icon||""} ${habit.name} ${streakBadgeHtml(hIdx)}`.trim();
    tr.appendChild(tdHabit);

    for(let d = 1; d <= nDays; d++){
      const td = document.createElement('td');
      td.className = "day-cell";
      td.tabIndex = 0;
      td.setAttribute('role', 'button');
      const key = `${hIdx}_${d}`;
      const mark = state.marks[key] || "";
      if(new Date(year, month, d).getDay() === 5){
        td.classList.add('friday-col');
        td.dataset.friday = "1";
      }
      if(d === todayDay){
        td.classList.add('today-col');
        td.dataset.today = "1";
      }
      applyMarkToCell(td, key, mark);
      td.dataset.key = key;
      td.addEventListener('click', () => cycleMark(key, td));
      td.addEventListener('keydown', (e) => {
        if(e.key === 'Enter' || e.key === ' '){
          e.preventDefault();
          cycleMark(key, td);
        }
      });
      tr.appendChild(td);
    }
    tbody.appendChild(tr);
  });

  const pointsRow = document.createElement('tr');
  pointsRow.className = "points-row";
  pointsRow.id = "pointsRow";
  const tdLabel = document.createElement('td');
  tdLabel.textContent = "النقاط (مكتسب/ممكن)";
  pointsRow.appendChild(tdLabel);
  const possibleDayPoints = maxDayPoints();
  for(let d = 1; d <= nDays; d++){
    const td = document.createElement('td');
    td.dataset.day = d;
    let earnedPoints = 0;
    state.habits.forEach((h, hIdx) => {
      earnedPoints += pointsForMark(h, state.marks[`${hIdx}_${d}`] || "");
    });
    td.textContent = possibleDayPoints
      ? formatEarnedPossible(earnedPoints, possibleDayPoints)
      : toArabicDigits(earnedPoints);
    td.title = `مكتسب/ممكن: ${earnedPoints} / ${possibleDayPoints}`;
    if(new Date(year, month, d).getDay() === 5) td.classList.add('friday-col');
    if(d === todayDay) td.classList.add('today-col');
    pointsRow.appendChild(td);
  }
  tbody.appendChild(pointsRow);
}

function updateWeeklyPoints(){
  const {year, month} = getCurrentYearMonth();
  const nDays = daysInMonth(year, month);
  const nWeeks = Math.ceil(nDays / 7);
  for(let w = 0; w < nWeeks; w++){
    const startDay = w*7 + 1;
    const endDay = Math.min(nDays, startDay + 6);
    let weekPoints = 0;
    for(let d = startDay; d <= endDay; d++){
      state.habits.forEach((h, hIdx) => {
        weekPoints += pointsForMark(h, state.marks[`${hIdx}_${d}`] || "");
      });
    }
    const badge = document.querySelector(`[data-week-points="${w}"]`);
    if(badge) badge.textContent = `إجمالي النقاط: ${toArabicDigits(weekPoints)}`;
  }
}

function renderWeekly(forceRebuild){
  const {year, month} = getCurrentYearMonth();
  const nDays = daysInMonth(year, month);
  const nWeeks = Math.ceil(nDays / 7);
  const key = `${year}-${month}-${nWeeks}`;
  const section = document.getElementById('weeklySection');

  if(!forceRebuild && weeklyBuiltFor === key && section.children.length === nWeeks){
    updateWeeklyPoints();
    return;
  }

  const active = document.activeElement;
  const activeWeek = active && active.dataset && active.dataset.week;
  const activePos = active && active.tagName === 'TEXTAREA' ? active.selectionStart : null;

  section.innerHTML = "";
  for(let w = 0; w < nWeeks; w++){
    const startDay = w*7 + 1;
    const endDay = Math.min(nDays, startDay + 6);
    let weekPoints = 0;
    for(let d = startDay; d <= endDay; d++){
      state.habits.forEach((h, hIdx) => {
        weekPoints += pointsForMark(h, state.marks[`${hIdx}_${d}`] || "");
      });
    }
    const monthWeek = w + 1;
    const yearWeek = getWeekOfYear(new Date(year, month, startDay));
    const card = document.createElement('div');
    card.className = "weekly-card";
    card.innerHTML = `
      <h3>
        أيام ${toArabicDigits(startDay)}–${toArabicDigits(endDay)}
        <span class="week-numbers">الأسبوع ${toArabicDigits(monthWeek)} من ${MONTH_NAMES[month]} - الأسبوع ${toArabicDigits(yearWeek)} من سنة ${toArabicDigits(year)}</span>
      </h3>
      <div class="week-points"><span data-week-points="${w}">إجمالي النقاط: ${toArabicDigits(weekPoints)}</span></div>
      <label style="display:block;margin-top:10px;font-weight:bold;">تخطيط الأسبوع:</label>
      <textarea data-week="${w}" placeholder="اكتب خطتك لهذا الأسبوع..."></textarea>
    `;
    const ta = card.querySelector('textarea');
    ta.value = state.weekly[w] || "";
    ta.addEventListener('input', () => {
      state.weekly[ta.dataset.week] = ta.value;
      saveState();
    });
    section.appendChild(card);
  }
  weeklyBuiltFor = key;

  if(activeWeek != null){
    const ta = section.querySelector(`textarea[data-week="${activeWeek}"]`);
    if(ta){
      ta.focus();
      if(activePos != null) ta.setSelectionRange(activePos, activePos);
    }
  }
}

function populateDaySelect(year, month, nDays){
  const sel = document.getElementById('daySelect');
  sel.innerHTML = "";
  for(let d = 1; d <= nDays; d++){
    const opt = document.createElement('option');
    opt.value = d;
    opt.textContent = `${toArabicDigits(d)} ${MONTH_NAMES[month]}`;
    if(d === currentDay) opt.selected = true;
    sel.appendChild(opt);
  }
}

function populateMonthSelect(){
  const sel = document.getElementById('monthSelect');
  sel.innerHTML = "";
  MONTH_NAMES.forEach((name, idx) => {
    const opt = document.createElement('option');
    opt.value = idx;
    opt.textContent = name;
    sel.appendChild(opt);
  });
}

function goToToday(){
  const now = new Date();
  document.getElementById('monthSelect').value = now.getMonth();
  document.getElementById('yearInput').value = now.getFullYear();
  currentDay = now.getDate();
  loadState();
  setViewMode('day');
}

function initApp(){
  const now = new Date();
  document.getElementById('monthSelect').value = now.getMonth();
  document.getElementById('yearInput').value = now.getFullYear();
  currentDay = now.getDate();
  loadState();
  setViewMode(getSavedViewMode());
}

function openSettings(){
  document.getElementById('settingsModal').classList.add('is-open');
  renderHabitManageList();
}

function closeSettings(){
  document.getElementById('settingsModal').classList.remove('is-open');
}

function renderHabitManageList(){
  const list = document.getElementById('habitManageList');
  if(!list) return;
  list.innerHTML = "";
  state.habits.forEach((habit, hIdx) => {
    const item = document.createElement('div');
    item.className = "habit-manage-item";
    item.innerHTML = `
      <input type="text" class="icon-input" data-field="icon" data-idx="${hIdx}" value="${escapeAttr(habit.icon||"")}" title="إيموجي">
      <input type="text" data-field="name" data-idx="${hIdx}" value="${escapeAttr(habit.name||"")}" placeholder="اسم العادة">
      <input type="text" data-field="cat" data-idx="${hIdx}" value="${escapeAttr(habit.cat||"")}" placeholder="التصنيف" style="flex:0.8;">
      <button type="button" class="danger" data-del="${hIdx}">حذف</button>
    `;
    list.appendChild(item);
  });

  list.querySelectorAll('input[data-field]').forEach(input => {
    input.addEventListener('change', () => {
      const idx = parseInt(input.dataset.idx, 10);
      const field = input.dataset.field;
      if(!state.habits[idx]) return;
      state.habits[idx][field === 'cat' ? 'cat' : field] = input.value.trim();
      saveState();
      renderAll();
    });
  });

  list.querySelectorAll('[data-del]').forEach(btn => {
    btn.addEventListener('click', () => {
      deleteHabitAt(parseInt(btn.dataset.del, 10));
    });
  });
}

function renderDayView(){
  const {year, month} = getCurrentYearMonth();
  const nDays = daysInMonth(year, month);
  if(currentDay > nDays) currentDay = nDays;
  if(currentDay < 1) currentDay = 1;

  const weekday = new Date(year, month, currentDay).getDay();
  document.getElementById('dayViewTitle').textContent =
    `${DAY_NAMES[weekday]} - ${toArabicDigits(currentDay)} ${MONTH_NAMES[month]} ${toArabicDigits(year)}`;
  populateDaySelect(year, month, nDays);

  const list = document.getElementById('dayHabitList');
  list.innerHTML = "";
  let earnedPoints = 0;
  const possibleDayPoints = maxDayPoints();

  let lastCat = null;
  state.habits.forEach((habit, hIdx) => {
    const cat = habit.cat || "";
    if(cat && cat !== lastCat){
      lastCat = cat;
      const catLabel = document.createElement('div');
      catLabel.className = "day-habit-cat";
      catLabel.style.alignSelf = "flex-start";
      catLabel.style.marginTop = hIdx === 0 ? "0" : "8px";
      catLabel.textContent = cat;
      list.appendChild(catLabel);
    }

    const key = `${hIdx}_${currentDay}`;
    const mark = normalizeMark(state.marks[key] || "");
    earnedPoints += pointsForMark(habit, mark);

    const item = document.createElement('div');
    item.className = "day-habit-item" + (mark === "check" ? " is-complete" : "");
    item.innerHTML = `
      <span class="day-habit-name">${habit.icon||""} ${habit.name}</span>
      ${streakBadgeHtml(hIdx)}
      <div class="day-toggle-group">
        <button type="button" class="day-toggle-btn ${mark==='check'?'active-check':''}" data-key="${key}" data-mark="check" aria-pressed="${mark==='check'}">✓ تم</button>
        <button type="button" class="day-toggle-btn ${mark==='x'?'active-x':''}" data-key="${key}" data-mark="x" aria-pressed="${mark==='x'}">✗ غير مكتمل</button>
      </div>
    `;
    list.appendChild(item);
  });

  list.querySelectorAll('.day-toggle-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const key = btn.dataset.key;
      const newMark = btn.dataset.mark;
      const parts = key.split('_');
      const hIdx = parseInt(parts[0], 10);
      const day = parseInt(parts[1], 10);
      const wasPerfect = getDayPoints(day).perfect;
      const wasAtLeastHalfX = dayXRatio(day) >= 0.5;
      const current = normalizeMark(state.marks[key] || "");
      state.marks[key] = current === newMark ? "" : newMark;
      updateLongestStreak(hIdx);
      saveState();
      celebrateIfNewlyPerfect(day, wasPerfect);
      encourageIfHalfX(day, wasAtLeastHalfX);
      renderDayView();
    });
  });

  document.getElementById('dayTotal').textContent = possibleDayPoints
    ? `نقاط اليوم (مكتسب/ممكن): ${formatEarnedPossible(earnedPoints, possibleDayPoints)}`
    : `نقاط اليوم: ${toArabicDigits(earnedPoints)}`;
}

function renderMonthSummary(){
  const {year, month} = getCurrentYearMonth();
  const nDays = daysInMonth(year, month);
  const list = document.getElementById('monthSummaryList');
  list.innerHTML = "";

  state.habits.forEach((habit, hIdx) => {
    let doneCount = 0;
    for(let d = 1; d <= nDays; d++){
      if((state.marks[`${hIdx}_${d}`] || "") === "check") doneCount++;
    }
    const pct = Math.round((doneCount / nDays) * 100);
    const row = document.createElement('div');
    row.className = "habit-progress-row";
    row.innerHTML = `
      <span class="habit-progress-name">${habit.icon||""} ${habit.name}</span>
      <div class="habit-progress-bar-wrap" title="${toArabicDigits(doneCount)} من ${toArabicDigits(nDays)} يومًا (${toArabicDigits(pct)}٪)">
        <div class="habit-progress-bar" style="width:${pct}%;" role="progressbar" aria-valuenow="${pct}" aria-valuemin="0" aria-valuemax="100"></div>
      </div>
      <span class="habit-progress-pct">${toArabicDigits(`${doneCount} / ${nDays}`)}</span>
      <span class="habit-progress-pct-box">${toArabicDigits(pct)}٪</span>
      ${streakBadgeHtml(hIdx)}
    `;
    list.appendChild(row);
  });

  let earnedMonthPoints = 0;
  for(let d = 1; d <= nDays; d++){
    state.habits.forEach((h, hIdx) => {
      earnedMonthPoints += pointsForMark(h, state.marks[`${hIdx}_${d}`] || "");
    });
  }
  const possibleMonthPoints = maxDayPoints() * nDays;
  const totalRow = document.createElement('div');
  totalRow.style.marginTop = "15px";
  totalRow.style.fontWeight = "bold";
  totalRow.style.fontSize = "1.1rem";
  totalRow.textContent = possibleMonthPoints
    ? `نقاط الشهر (مكتسب/ممكن): ${formatEarnedPossible(earnedMonthPoints, possibleMonthPoints)}`
    : `نقاط الشهر: ${toArabicDigits(earnedMonthPoints)}`;
  list.appendChild(totalRow);
}

document.getElementById('loadBtn').addEventListener('click', loadState);
document.getElementById('monthSelect').addEventListener('change', () => {
  loadState();
  if(viewMode === "day") renderDayView();
});
document.getElementById('yearInput').addEventListener('change', () => {
  loadState();
  if(viewMode === "day") renderDayView();
});

document.getElementById('resetBtn').addEventListener('click', () => {
  if(confirm("مسح بيانات هذا الشهر؟")){
    const {year, month} = getCurrentYearMonth();
    localStorage.removeItem(storageKey(year, month));
    loadState();
    showToast('تم مسح الشهر');
  }
});

document.getElementById('addHabitBtn').addEventListener('click', () => {
  const name = document.getElementById('newHabitName').value.trim();
  const cat = document.getElementById('newHabitCat').value.trim();
  const icon = document.getElementById('newHabitIcon').value.trim();
  if(!name) return;
  state.habits.push({name, cat, icon});
  document.getElementById('newHabitName').value = "";
  document.getElementById('newHabitCat').value = "";
  document.getElementById('newHabitIcon').value = "";
  saveState();
  renderAll();
  showToast('تمت إضافة العادة');
});

document.getElementById('exportBtn').addEventListener('click', () => {
  const {year, month} = getCurrentYearMonth();
  const blob = new Blob([JSON.stringify(state, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `tracker_${year}_${String(month+1).padStart(2,'0')}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('تم التصدير');
});

document.getElementById('importBtn').addEventListener('click', () => {
  document.getElementById('importFile').click();
});

document.getElementById('importFile').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try{
      const parsed = JSON.parse(ev.target.result);
      state = {
        habits: syncHabitPointsFromDefaults(parsed.habits || JSON.parse(JSON.stringify(DEFAULT_HABITS))),
        marks: parsed.marks || {},
        weekly: parsed.weekly || {},
        longestStreaks: parsed.longestStreaks || {}
      };
      weeklyBuiltFor = null;
      saveState();
      renderAll();
      showToast('تم الاستيراد');
    }catch(err){
      alert('ملف غير صالح');
    }
  };
  reader.readAsText(file);
  e.target.value = "";
});

document.getElementById('settingsBtn').addEventListener('click', openSettings);
document.getElementById('closeSettingsBtn').addEventListener('click', closeSettings);
document.getElementById('settingsModal').addEventListener('click', (e) => {
  if(e.target.id === 'settingsModal') closeSettings();
});
document.addEventListener('keydown', (e) => {
  if(e.key === 'Escape') closeSettings();
});

document.getElementById('showDayBtn').addEventListener('click', () => setViewMode('day'));
document.getElementById('showMonthBtn').addEventListener('click', () => setViewMode('month'));
document.getElementById('prevMonthBtn').addEventListener('click', () => shiftMonth(-1));
document.getElementById('nextMonthBtn').addEventListener('click', () => shiftMonth(1));
document.getElementById('prevDayBtn').addEventListener('click', () => {
  currentDay -= 1;
  if(currentDay < 1){
    const {year, month} = getCurrentYearMonth();
    let y = year, m = month - 1;
    if(m < 0){ m = 11; y -= 1; }
    setYearMonth(y, m, daysInMonth(y, m));
    return;
  }
  renderDayView();
});
document.getElementById('nextDayBtn').addEventListener('click', () => {
  const {year, month} = getCurrentYearMonth();
  currentDay += 1;
  if(currentDay > daysInMonth(year, month)){
    let y = year, m = month + 1;
    if(m > 11){ m = 0; y += 1; }
    setYearMonth(y, m, 1);
    return;
  }
  renderDayView();
});
document.getElementById('daySelect').addEventListener('change', (e) => {
  currentDay = parseInt(e.target.value, 10);
  renderDayView();
});
document.getElementById('goTodayBtn').addEventListener('click', goToToday);

populateMonthSelect();
runPointsSelfTests();
runStreakSelfTests();
initApp();
</script>

</body>
